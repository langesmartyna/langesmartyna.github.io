<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="https://formspree.io/f/mjvpldjb" method="POST">
        <label for="imie">Imię</label>
        <input type="text" name="imie" id="imie"><br>

        <label for="nazwisko">Nazwisko</label>
        <input type="text" name="nazwisko" id="nazwisko"><br>

        <label for="mail">E-mail</label>
        <input type="email" name="mail" id="mail"><br>

        <label for="phone">Telefon</label>
        <input type="tel" name="phone" id="phone"><br>

        <label for="city">Miasto</label>
        <select name="city"><br>
            <option value="miasto1">Kraków</option>
            <option value="miasto2">Warszawa</option>
            <option value="miasto3">Gdańsk</option>
        </select><br>
        
        <label for="gender">Mężczyzna</label>
        <input type="radio" name="gender" id="gender"><br>

        <label for="plec">Kobieta</label>
        <input type="radio" name="plec" id="plec"><br>

        <label for="agreement">Zgoda na dane osobowe</label>
        <input type="checkbox" name="agreement" id="agreement"><br>

        <label for="komentarz">Komentarz</label>
        <textarea name="komentarz" id="komentarz"></textarea><br>

        <input type="submit" value="Wyślij formularz">

    </form>

</body>
</html>
